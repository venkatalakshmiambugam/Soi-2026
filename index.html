<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #00f2fe;
        }
        #score-board {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: #162447;
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #0f4c75;
        }
        canvas {
            background-color: #16161a;
            border: 4px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>SNAKE GAME</h1>
    <div id="score-board">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Grid and block constraints
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Snake configuration
        let snake = [
            {x: 10, y: 10},
        ];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameStarted = false;

        // Main game loop engine
        function main() {
            if (hasGameEnded()) {
                alert("Game Over! Your final score was " + score);
                resetGame();
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // Start operations
        resetGame();

        // Clear canvas frame
        function clearCanvas() {
            ctx.fillStyle = "#16161a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Render snake blocks
        function drawSnake() {
            ctx.fillStyle = "#00f2fe";
            ctx.strokeStyle = "#16161a";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        // Calculate snake physics
        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Eat item evaluation
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        // Render apple element
        function drawFood() {
            ctx.fillStyle = "#ff2a6d";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
        }

        // Set item on random grid coordinates
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Ensure item does not spawn on top of the snake body
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) generateFood();
            });
        }

        // Physics bounds check
        function hasGameEnded() {
            // Self-destructive collision rule
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Outer perimeter layout boundaries
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // Handle control input maps
        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            const LEFT_KEY = 37;
            const UP_KEY = 38;
            const RIGHT_KEY = 39;
            const DOWN_KEY = 40;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            // Enforce axis locks so player cannot turn directly backward
            if (keyPressed === LEFT_KEY && !goingRight) { dx = -1; dy = 0; startLoop(); }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -1; startLoop(); }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 1; dy = 0; startLoop(); }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 1; startLoop(); }
        }

        // Activate core logic loops upon direction change
        function startLoop() {
            if (!gameStarted) {
                gameStarted = true;
                gameInterval = setInterval(main, 100); // Loops every 100ms
            }
        }

        // Initialize state fields
        function resetGame() {
            clearInterval(gameInterval);
            snake = [{x: 10, y: 10}];
            score = 0;
            dx = 0;
            dy = 0;
            gameStarted = false;
            scoreElement.innerText = score;
            clearCanvas();
            generateFood();
            drawFood();
            drawSnake();
        }

        document.addEventListener("keydown", changeDirection);
    </script>
</body>
</html>
